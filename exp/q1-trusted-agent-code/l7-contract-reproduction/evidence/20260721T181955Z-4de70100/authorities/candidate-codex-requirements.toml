allowed_approval_policies = ["never"]
allowed_web_search_modes = []
allow_managed_hooks_only = true
default_permissions = "q1_l1"

[allowed_permission_profiles]
q1_l1 = true

[features]
apps = false
browser_use = false
browser_use_external = false
browser_use_full_cdp_access = false
computer_use = false
hooks = false
in_app_browser = false
multi_agent = false
plugins = false
remote_plugin = false
workspace_dependencies = false

[permissions.q1_l1]
description = "Q1/L1 candidate authoring: public contract plus candidate workspace, no command network"

[permissions.q1_l1.filesystem]
":minimal" = "read"
"~/.codex" = "deny"

[permissions.q1_l1.filesystem.":workspace_roots"]
"." = "write"
".venv" = "read"
"AGENTS.md" = "read"
"public/contract" = "read"

[permissions.q1_l1.network]
enabled = false

[mcp_servers]
