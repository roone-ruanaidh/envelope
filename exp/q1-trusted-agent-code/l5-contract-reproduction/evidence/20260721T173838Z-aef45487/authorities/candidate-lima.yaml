minimumLimaVersion: "2.1.4"
vmType: vz
arch: aarch64

images:
  - location: https://cloud-images.ubuntu.com/releases/resolute/release-20260627/ubuntu-26.04-server-cloudimg-arm64.img
    arch: aarch64
    digest: sha256:3d8db37fa9a8a0c8676dfc0ee3eb41fd0049d66cb055a792bddc8f4123443ae1

cpus: 4
memory: 8GiB
disk: 40GiB

# The implementation agent's outer confidentiality boundary: no host path is
# mounted, including the Envelope repository and sealed evaluator.
mounts: []
mountInotify: false

ssh:
  loadDotSSHPubKeys: false
  forwardAgent: false
  forwardX11: false
  forwardX11Trusted: false
  overVsock: true

containerd:
  system: false
  user: false

portForwards: []
hostResolver:
  enabled: true
  ipv6: false
propagateProxyEnv: false
timezone: America/Denver
