<svg xmlns="http://www.w3.org/2000/svg" viewBox="1.6 22.7 61.2 39.7" width="320" height="208">
  <!-- Trajectory glyph: fan of launch arcs, bead markers, dashed envelope -->
  <rect x="1.6" y="22.7" width="61.2" height="39.7" rx="10" fill="#0F2325"/>

  <!-- launch arcs (75°, 60°, 45°, 30°) -->
  <g fill="none" stroke="#C9B27E" stroke-width="1.4" stroke-linecap="round" opacity="0.9">
    <path d="M8,56 Q20,11.2 32,56"/>
    <path d="M8,56 Q28.78,20 49.57,56"/>
    <path d="M8,56 Q32,32 56,56"/>
    <path d="M8,56 Q28.78,44 49.57,56"/>
  </g>

  <!-- beads -->
  <g stroke="#0F2325" stroke-width="0.6">
    <!-- steep arc: gold -->
    <circle cx="15.2" cy="37.2" r="2.1" fill="#E8B44A"/>
    <circle cx="20"   cy="33.6" r="2.1" fill="#E8B44A"/>
    <circle cx="26"   cy="39.2" r="2.1" fill="#E8B44A"/>
    <!-- 60° arc: orange -->
    <circle cx="22.5" cy="39.6" r="2.1" fill="#E07B39"/>
    <circle cx="35"   cy="39.6" r="2.1" fill="#E07B39"/>
    <!-- 45° arc: red -->
    <circle cx="22.4" cy="45.9" r="2.1" fill="#C0452F"/>
    <circle cx="36.8" cy="44.5" r="2.1" fill="#C0452F"/>
    <circle cx="48.8" cy="49.9" r="2.1" fill="#E5DCC3"/>
    <!-- shallow arc: violet -->
    <circle cx="24.6" cy="50.2" r="2.1" fill="#4A6FB5"/>
    <circle cx="39.2" cy="51.5" r="2.1" fill="#8A5A9E"/>
  </g>

  <!-- launch point (same bead style) -->
  <circle cx="8" cy="56" r="2.1" fill="#E5DCC3" stroke="#0F2325" stroke-width="0.6"/>

  <!-- envelope of safety (dashed), drawn last and outside everything -->
  <path d="M8,27.5 Q33.5,27.5 58,56" fill="none" stroke="#E5DCC3" stroke-width="1.6"
        stroke-linecap="round" stroke-dasharray="0.5 4.5"/>
</svg>
